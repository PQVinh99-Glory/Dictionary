<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Pages Function → R2 Test</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#f1f5f9;color:#0f172a;margin:0;padding:24px}
    main{max-width:760px;margin:auto;background:#fff;border:1px solid #e2e8f0;border-radius:24px;padding:24px;box-shadow:0 18px 50px rgba(15,23,42,.08)}
    h1{margin-top:0}.row{display:grid;gap:12px;margin:14px 0}
    input,select,button{font:inherit;padding:12px 14px;border-radius:12px;border:1px solid #cbd5e1}
    button{font-weight:800;cursor:pointer;background:#059669;color:#fff;border:0}
    button.secondary{background:#0f172a}
    pre{white-space:pre-wrap;word-break:break-word;background:#0f172a;color:#e2e8f0;padding:16px;border-radius:14px;min-height:110px}
    .warn{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;padding:14px;border-radius:14px}
    .ok{background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46;padding:14px;border-radius:14px}
  </style>
</head>
<body>
<main>
  <h1>Frontend + Pages Function + R2 Binding</h1>
  <p>Trang này chỉ test upload R2. <strong>Không ghi metadata Supabase.</strong></p>

  <div class="warn">
    Hãy đăng nhập ở <code>/</code> trước để localStorage có session token.
    Khi chạy trên Cloudflare Pages, upload test sẽ tạo object thật trên R2.
  </div>

  <div class="row">
    <button id="health" class="secondary">1. Kiểm tra /api/upload/health</button>
  </div>

  <div class="row">
    <input id="code" value="TEST_PAGES_R2">
    <select id="type">
      <option value="detail">detail</option>
      <option value="front">front</option>
      <option value="back">back</option>
      <option value="thumb">thumb</option>
    </select>
    <input id="file" type="file" accept="image/png,image/jpeg,image/webp">
    <button id="upload">2. Upload thử vào R2</button>
  </div>

  <p id="tokenState"></p>
  <pre id="out">Chưa chạy test.</pre>

<script>
const TOKEN_KEY = 'catalogue_app_session_token_v3_r2';
const R2_PUBLIC_URL = 'https://pub-fe997ecbd0714682b10cba684d175ac8.r2.dev';
const out = document.querySelector('#out');
const tokenState = document.querySelector('#tokenState');

function token() { return localStorage.getItem(TOKEN_KEY) || ''; }
function show(v) { out.textContent = typeof v === 'string' ? v : JSON.stringify(v, null, 2); }
function refreshTokenState() {
  tokenState.className = token() ? 'ok' : 'warn';
  tokenState.textContent = token()
    ? 'Đã tìm thấy session token trong localStorage.'
    : 'Chưa có session token. Mở /, đăng nhập, rồi quay lại trang test.';
}
refreshTokenState();

document.querySelector('#health').onclick = async () => {
  show('Đang kiểm tra...');
  try {
    const r = await fetch('/api/upload/health', {cache:'no-store'});
    const data = await r.json().catch(() => ({}));
    show({http:r.status, ...data});
  } catch (e) {
    show({error:e.message});
  }
};

document.querySelector('#upload').onclick = async () => {
  const sessionToken = token();
  const file = document.querySelector('#file').files[0];
  if (!sessionToken) return show('Thiếu session token. Đăng nhập app chính trước.');
  if (!file) return show('Chưa chọn ảnh.');

  const uploadId = crypto.randomUUID?.() || `${Date.now()}_${Math.random().toString(36).slice(2)}`;
  const form = new FormData();
  form.append('file', file);
  form.append('code', document.querySelector('#code').value || 'TEST_PAGES_R2');
  form.append('asset_type', document.querySelector('#type').value);
  form.append('upload_id', uploadId);

  show('Đang upload...');
  try {
    const r = await fetch('/api/upload', {
      method:'POST',
      headers:{
        'x-session-token':sessionToken,
        'x-upload-id':uploadId
      },
      body:form
    });
    const data = await r.json().catch(() => ({}));
    const result = {http:r.status, ...data};
    if (data.image_path) {
      result.public_url = `${R2_PUBLIC_URL}/${String(data.image_path).replace(/^\/+/, '')}`;
    }
    show(result);
  } catch (e) {
    show({error:e.message});
  }
};
</script>
</main>
</body>
</html>
